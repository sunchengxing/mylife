name: Build Android APK

on:
  push:
    branches: [master]
    paths:
      - 'android/**'
      - 'recipe-api/**'
      - '.github/workflows/build-android.yml'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            android/app/build
          key: gradle-${{ hashFiles('android/**/*.gradle.kts', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'http://49.12.223.172:8080/api/' }}
          RECIPE_API_URL: ${{ vars.RECIPE_API_URL || 'http://49.12.223.172:8081/' }}

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mylife-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Build Release APK (unsigned)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL || 'http://49.12.223.172:8080/api/' }}
          RECIPE_API_URL: ${{ vars.RECIPE_API_URL || 'http://49.12.223.172:8081/' }}

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mylife-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload APKs to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
