name: Build Recipe API

on:
  push:
    branches: [master]
    paths:
      - 'recipe-api/**'
      - '.github/workflows/build-recipe-api.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('recipe-api/pom.xml') }}
          restore-keys: maven-

      - name: Build JAR
        working-directory: recipe-api
        run: mvn package -DskipTests -q

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: recipe-api-jar
          path: recipe-api/target/recipe-api-1.0.0.jar
          retention-days: 30
